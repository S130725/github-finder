<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gitub User Finder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="gitub.css">
</head>
<body>
    
    <div class="container">
        <header>
            <h1>
                <i class="fab fa-github"></i>GitHub User Finder
            </h1>
            <p>Search for any GitHub user to see their profile and repositories</p>
        </header>
        <div class="search-container">
            <input type="text" id="search" placeholder="Enter a GitHub username..." autocomplete="off">
            <button id="search-btn">Search</button>
            
        </div>
        <div id ="profile-container" class="hidden">
            <div class="profile-header">
                <img src="" alt="profile avatar" id="avatar">
                <div class="profile-info">
                    <h2 id="name"></h2>
                    <p id="username"></p>
                    <p id="bio"></p>
                    <div class="lacation-date">
                <i class="fas fa-map-marker-alt"></i>
                <span id="location">not specified</span>
            </p>
            <p>
                <i class="far fa-calender-alt"></i>
                joined
                <span id="joined-date">not specified</span>
            </p>
                </div>
                <a id="profile-link" target="_blank" class="btn">view profile</a>
            </div>
        </div>
        <div class="stats">
            <div class="stat">
                <i class="fas fa-users"></i>
                <span id="followers"></span>followers
            </div>

              <div class="stat">
                <i class="fas fa-user-friends"></i>
                <span id="following"></span>following
            </div>
            
             
                 <div class="stat">
                <i class="fas fa-code-branch"></i>
                <span id="repos"></span>repositories
            </div>
        </div>

        <div class="aditional-info">
            <div class="info-item" id="company-container">
                <i class="fas fa-building"></i>
                <span class="company">not Specified</span>
            </div>
            <div class="info-item" id="blog-container">
                 <i class="fas fa-link"></i>
                <a id="blog" target="_blank">no website</a>
            </div>
            <div class="info-item" id="twitter-container">
                <i class="fab fa-twitter"></i>
                <a id="twitter" target="_blank">no twitter</a>

            </div>
        </div>

        <div class="repos-section">
            <h3>Latest repositories</h3>
            <div id="repos-container" class="repos-container">
                <!-- Repositories will be inserted here dynamically -->

                <div class="loading-repos">Loading repositories...</div>
            </div>
        </div>
    </div>

    <div class="error-container" class="hidden">
        <p>no user found. please another username.</p>
    </div>
    </div>
      
</body>
    <script src="gitub.js"></script>

</html>
